<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dom-css-dump test</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f0f0; }
        #app { margin: 2rem; padding: 1rem; background: white; border: 1px solid #ccc; border-radius: 4px; }
        .red-text { color: red; }
        .blue-bg { background-color: lightblue; padding: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <h1>Testing dom-css-dump</h1>
        <p class="red-text">This text is red.</p>
        <div class="blue-bg">
            <p style="font-weight: bold;">This section has a lightblue background and bold text.</p>
        </div>
    </div>
    
    <script type="module">
        import { getStyleNames, dumpDomTree, recreateStyleMap, dumpDomTreeInterned, recreateInternedStyleMap } from './index.js';

        console.log('--- dom-css-dump ---');
        
        const appNode = document.getElementById('app');
        
        // 1. Get style names
        const styleNames = getStyleNames(document.body);
        console.log(`Extracted ${styleNames.length} style properties:`, styleNames.slice(0, 10), '...');
        
        // 2. Dump the tree (Standard)
        const dumpedTree = dumpDomTree(appNode, styleNames);
        console.log('Standard Dumped Tree:', dumpedTree);
        
        // 3. Recreate style map (Standard)
        const rootStyleValues = dumpedTree[dumpedTree.length - 1];
        const recreatedStyles = recreateStyleMap(styleNames, rootStyleValues);
        console.log('Standard Recreated Map for #app:', {
            margin: recreatedStyles.margin,
            padding: recreatedStyles.padding,
            backgroundColor: recreatedStyles['background-color'],
        });

        console.log('--- dom-css-dump (String Interning) ---');

        // 4. Dump the tree with string interning
        const internMap = new Map();
        const internDict = [];
        const internedTree = dumpDomTreeInterned(appNode, styleNames, internMap, internDict);
        
        console.log('Interned Tree Representation:', internedTree);
        console.log(`Intern Dictionary Size: ${internDict.length} unique values`, internDict);

        // 5. Recreate style map (Interned)
        const rootInternedStyleIds = internedTree[internedTree.length - 1];
        const recreatedInternedStyles = recreateInternedStyleMap(styleNames, rootInternedStyleIds, internDict);
        
        console.log('Interned Recreated Map for #app:', {
            margin: recreatedInternedStyles.margin,
            padding: recreatedInternedStyles.padding,
            backgroundColor: recreatedInternedStyles['background-color'],
        });
        
        // Size comparison text
        console.log(`Size comparison (JSON strings):`);
        console.log(`Standard stringified length: ${JSON.stringify(dumpedTree).length} bytes`);
        console.log(`Interned stringified length: ${JSON.stringify({ tree: internedTree, dict: internDict }).length} bytes`);
    </script>
</body>
</html>
